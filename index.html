<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NCI Bird Conservation Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1b2a;
      margin: 0;
      overflow: hidden;
    }

    /* Loading screen */
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0d1b2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .logo { font-size: 56px; margin-bottom: 20px; }
    h1 { color: #4fc3f7; font-size: 24px; margin-bottom: 10px; }
    p  { color: #a0b4c8; font-size: 14px; margin-bottom: 30px; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #1a4a7a;
      border-top: 4px solid #4fc3f7;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .status {
      color: #4a6fa5;
      font-size: 12px;
    }

    /* App iframe — fills entire window */
    #app-frame {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Loading screen shown while iframe loads -->
  <div id="loading">
    <div class="logo">🦜</div>
    <h1>NCI Bird Conservation Dashboard</h1>
    <p>Biodiversity assessment across Latin America</p>
    <div class="spinner"></div>
    <p class="status" id="status-text">Connecting to dashboard...</p>
  </div>

  <!-- App loads here — URL stays as github.io -->
  <iframe
    id="app-frame"
    src="https://coated-tackle-webmasters-ultimate.trycloudflare.com/nci-app/"
    onload="showApp()"
    onerror="showError()">
  </iframe>

  <script>
    function showApp() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app-frame').style.display = 'block';
    }

    function showError() {
      document.getElementById('status-text').textContent =
        'Dashboard is starting up — please wait 30 seconds and refresh.';
    }

    // Timeout fallback — show app after 30s regardless
    setTimeout(function() {
      showApp();
    }, 30000);
  </script>

</body>
</html>
